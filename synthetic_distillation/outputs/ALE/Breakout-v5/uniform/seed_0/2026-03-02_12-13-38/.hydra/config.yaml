env:
  name: ALE/Breakout-v5
  type: atari
algo:
  lr: 0.00025
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.01
  ppo_epochs: 10
  rollout_steps: 128
  minibatch_size: 256
  total_timesteps: 10000000
  num_envs: 8
  anneal_lr: false
distill:
  mode: uniform
  batch_size: 2048
  epochs: 100
  distil_samples:
  - 10000
  - 25000
  - 50000
  - 100000
  loss: mean_mse
  sampling:
    mode: uniform_global
    low: 0
    high: 255
model:
  neurons: 64
  layers: 2
  distil_neurons:
  - 1.0
  - 0.5
  - 0.25
  distil_layers: 2
experiment:
  name: baseline
  description: Baseline experiment with default parameters.
seed: 0
device: cuda
log:
  use_tensorboard: true
  log_interval: 10
robustness:
  noise_levels: '[]'
  episodes: 10
