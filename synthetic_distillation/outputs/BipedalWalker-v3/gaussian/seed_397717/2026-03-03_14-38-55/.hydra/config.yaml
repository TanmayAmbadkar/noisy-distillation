env:
  name: BipedalWalker-v3
  type: continuous
algo:
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.001
  ppo_epochs: 10
  rollout_steps: 2048
  minibatch_size: 1024
  total_timesteps: 5000000
  num_envs: 16
  anneal_lr: true
  eval_freq: 100000
distill:
  mode: gaussian
  batch_size: 2048
  epochs: 100
  distil_samples:
  - 10000
  - 25000
  - 50000
  - 100000
  loss: mean_mse
  sampling:
    mode: gaussian
    std: 0.1
model:
  neurons: 64
  layers: 2
  distil_neurons:
  - 1.0
  - 0.5
  - 0.25
  distil_layers: 2
experiment:
  name: baseline
  description: Baseline experiment with default parameters.
seed: 397717
device: cpu
log:
  use_tensorboard: true
  log_interval: 10
robustness:
  noise_levels: '[]'
  episodes: 100
