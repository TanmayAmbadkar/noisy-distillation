env:
  name: breakout
  type: atari
algo:
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.0001
  ppo_epochs: 10
  rollout_steps: 128
  minibatch_size: 64
  total_timesteps: 128
  num_envs: 1
distill:
  mode: uniform
  batch_size: 2048
  epochs: 1
  distil_samples: 128
  loss: mean_mse
  sampling:
    mode: uniform_global
    low: 0
    high: 255
model:
  neurons: 64
  layers: 2
  distil_neurons: 1.0
  distil_layers: 2
experiment:
  name: baseline
  description: Baseline experiment with default parameters.
seed: 0
device: cpu
log:
  use_tensorboard: true
  log_interval: 10
robustness:
  noise_levels: '[]'
  episodes: 100
